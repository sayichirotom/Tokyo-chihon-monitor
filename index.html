<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tokyo Chihon Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">Tokyo Chihon Monitor</p>
      <h1>東京地本 世論モニター</h1>
      <p>公開情報を収集し、肯定・中立・否定、話題、リスクを日次で整理します。</p>
      <p class="note">対象：公開Web、RSS、GoogleニュースRSS等。非公開SNS・ログイン必須情報・規約違反スクレイピングは対象外。</p>
    </header>

    <section class="cards">
      <div class="card"><span>取得件数</span><strong id="total">読込中</strong></div>
      <div class="card positive"><span>肯定</span><strong id="positive">-</strong></div>
      <div class="card neutral"><span>中立</span><strong id="neutral">-</strong></div>
      <div class="card negative"><span>否定</span><strong id="negative">-</strong></div>
    </section>

    <section>
      <h2>AI風サマリー</h2>
      <p id="summary">読込中です。</p>
    </section>

    <section>
      <h2>注目キーワード</h2>
      <div id="keywords" class="keywords"></div>
    </section>

    <section>
      <h2>収集結果</h2>
      <input id="search" placeholder="検索：防衛大学校、航空学生、説明会など">
      <div id="items"></div>
    </section>

    <footer>
      <p>最終更新：<span id="updated">-</span></p>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
